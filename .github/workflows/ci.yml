name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Run logic tests
        run: ./scripts/test.sh

      - name: Build release executable
        run: swift build -c release

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Validate app metadata
        run: |
          test -x "dist/GitHub Actions Notifier.app/Contents/MacOS/MacGHActionsNotifier"
          plutil -lint "dist/GitHub Actions Notifier.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :LSUIElement" "dist/GitHub Actions Notifier.app/Contents/Info.plist" | grep -q true

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: GitHub-Actions-Notifier-app
          path: dist/GitHub Actions Notifier.app
          if-no-files-found: error
